<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7EE"/>
      <stop offset="0.5" stop-color="#F4EBDD"/>
      <stop offset="1" stop-color="#F0E2D2"/>
    </linearGradient>
    <linearGradient id="panel" x1="202" y1="113" x2="1002" y2="617" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#FFF8F1" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A24D29"/>
      <stop offset="1" stop-color="#D06B37"/>
    </linearGradient>
    <filter id="shadow" x="140" y="90" width="1000" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#8C5B38" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="160" cy="120" r="160" fill="#FFFFFF" fill-opacity="0.55"/>
  <circle cx="1170" cy="620" r="190" fill="#F2D9C4" fill-opacity="0.65"/>
  <circle cx="1110" cy="105" r="82" fill="#F8E6D4"/>

  <g filter="url(#shadow)">
