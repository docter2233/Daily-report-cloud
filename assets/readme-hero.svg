    <text x="478" y="482" fill="#8C451E" font-family="Segoe UI, PingFang SC, Noto Sans SC, sans-serif" font-size="22" font-weight="700">GitHub Pages Site</text>

    <rect x="720" y="180" width="320" height="360" rx="30" fill="#FFFDF8" stroke="#E5D7C6"/>
    <rect x="748" y="213" width="120" height="22" rx="11" fill="#F1DFCF"/>
    <text x="762" y="229" fill="#8C451E" font-family="Segoe UI, PingFang SC, Noto Sans SC, sans-serif" font-size="13" font-weight="700">Today on your phone</text>

