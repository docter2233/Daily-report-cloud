    <text x="766" y="397" fill="#6A6158" font-family="Segoe UI, PingFang SC, Noto Sans SC, sans-serif" font-size="15">定位 / 价值 / 接入姿势</text>

    <rect x="748" y="427" width="264" height="72" rx="18" fill="#F9F1E8"/>
    <text x="766" y="456" fill="#1F1A16" font-family="Segoe UI, PingFang SC, Noto Sans SC, sans-serif" font-size="18" font-weight="700">Cloud Delivery</text>
    <text x="766" y="483" fill="#6A6158" font-family="Segoe UI, PingFang SC, Noto Sans SC, sans-serif" font-size="15">GitHub Actions + Pages + PushPlus</text>
